default_stages: [pre-commit]

repos:
  # ── Python: ruff (lint + format) ──────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Python: mypy type-checking ─────────────────────────────────────────────
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: uv run mypy packages/xact-py/src packages/sxact/src
        pass_filenames: false
        types_or: [python, toml]
        files: ^(packages/.*\.py|pyproject\.toml)$
        stages: [pre-commit, pre-push]

  # ── Julia: JuliaFormatter ──────────────────────────────────────────────────
  # Uses a dedicated tooling env so it never conflicts with the main project deps.
  # Requires Julia in PATH; run `julia -e 'using Pkg; Pkg.instantiate()'` in
  # tooling/ to set it up on a fresh machine.
  - repo: local
    hooks:
      - id: julia-format
        name: julia-format
        language: system
        entry: julia --project=tooling -e "
          using JuliaFormatter;
          ok = format(ARGS; overwrite=true);
          ok || (println(\"Reformatted Julia files — stage changes and re-commit\"); exit(1))
          " --
        pass_filenames: true
        types_or: [julia]
        exclude: ^notebooks/

  # ── Notebooks: Quarto convert + nbstripout ─────────────────────────────────
  # Source files (.qmd) are the single source of truth.
  # On commit: convert .qmd → .ipynb, then strip outputs.
  - repo: local
    hooks:
      - id: quarto-sync
        name: quarto-sync
        language: system
        entry: uv run python scripts/qmd2ipynb.py
        files: ^notebooks/.*\.qmd$
        pass_filenames: true
      - id: nbstripout
        name: nbstripout
        language: system
        entry: uv run nbstripout
        files: \.ipynb$
        pass_filenames: true

  # ── Spell-checking: typos ──────────────────────────────────────────────────
  - repo: https://github.com/crate-ci/typos
    rev: v1.32.0
    hooks:
      - id: typos

  # ── Prose linting: vale ───────────────────────────────────────────────────
  # Uses system vale (brew install vale) — the upstream repo hook requires Go + C++.
  - repo: local
    hooks:
      - id: vale
        name: vale
        language: system
        entry: vale --no-exit
        pass_filenames: true
        types_or: [markdown]

  # ── Trailing whitespace / EOF ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Pre-push: Run All Tests ────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: julia-tests
        name: julia-tests
        description: Run Julia tests on push if Julia source or tests changed.
        language: system
        entry: bash -c "julia --project=. test/runtests.jl && julia --project=. test/julia/test_xperm.jl && julia --project=. test/julia/test_xtensor.jl"
        pass_filenames: false
        files: ^(src/.*\.jl|test/.*\.jl|Project\.toml)$
        stages: [pre-push]
      - id: python-tests
        name: python-tests
        description: Run Python unit tests on push if Python or Julia source/tests changed.
        language: system
        entry: bash -c "uv run pytest tests/unit -q --ignore=tests/integration --ignore=tests/properties --ignore=tests/xperm --ignore=tests/xtensor && uv run pytest tests/test_julia_adapter.py -q"
        pass_filenames: false
        files: ^(packages/.*\.py|tests/.*\.py|pyproject\.toml|src/.*\.jl|Project\.toml)$
        stages: [pre-push]
      - id: toml-regression
        name: toml-regression
        description: Run TOML snapshot regression tests on push (MISSING snapshots tolerated).
        language: system
        entry: bash -c "fail=0; for d in tests/xperm tests/xtensor; do out=$(uv run xact-test run $d --adapter julia --oracle-mode snapshot --oracle-dir oracle 2>&1); echo \"$out\"; echo \"$out\" | grep -q '  FAIL  ' && fail=1; done; exit $fail"
        pass_filenames: false
        files: ^(src/.*\.jl|packages/.*\.py|tests/(xperm|xtensor)/.*\.toml|oracle/)$
        stages: [pre-push]
