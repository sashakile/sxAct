# xcore/list_utils.toml
# Tests for xCore list utility functions: JustOne, MapIfPlus,
# DeleteDuplicates, DuplicateFreeQ.
# These are Category-A (must-implement) symbols from sxAct-0q8.
# Validates against schema: tests/schema/test-schema.json

[meta]
id          = "xcore/list_utils"
description = "xCore list utility functions (layer 1 unit tests)"
tags        = ["xcore", "layer:1"]
layer       = 1
oracle_is_axiom = true

# ---------------------------------------------------------------------------
# Tests
# ---------------------------------------------------------------------------

[[tests]]
id          = "justone_singleton"
description = "JustOne[{x}] extracts the single element"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "JustOne[{42}] === 42"
message   = "JustOne should unwrap a singleton list"

# ---------------------------------------------------------------------------

[[tests]]
id          = "justone_string_element"
description = "JustOne[{\"hello\"}] extracts a string element"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "JustOne[{\"hello\"}] === \"hello\""
message   = "JustOne should work on non-integer elements"

# ---------------------------------------------------------------------------

[[tests]]
id          = "justone_multi_throws"
description = "JustOne on a multi-element list throws (Catch returns Null)"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "Catch[JustOne[{1, 2}]] === Null"
message   = "JustOne with 2 elements should Throw, caught as Null"

# ---------------------------------------------------------------------------

[[tests]]
id          = "justone_empty_throws"
description = "JustOne on an empty list throws (Catch returns Null)"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "Catch[JustOne[{}]] === Null"
message   = "JustOne with 0 elements should Throw, caught as Null"

# ---------------------------------------------------------------------------

[[tests]]
id          = "mapifplus_on_sum"
description = "MapIfPlus maps f over each summand when expr has head Plus"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "Head[MapIfPlus[f, a + b]] === Plus"
message   = "MapIfPlus[f, a+b] should have head Plus (result is f[a]+f[b])"

# ---------------------------------------------------------------------------

[[tests]]
id          = "mapifplus_on_sum_components"
description = "MapIfPlus[f, a+b] equals f[a] + f[b]"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "MapIfPlus[f, a + b] === f[a] + f[b]"
message   = "MapIfPlus should distribute f over summands"

# ---------------------------------------------------------------------------

[[tests]]
id          = "mapifplus_on_non_plus"
description = "MapIfPlus[f, x] returns f[x] when expr is not a sum"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "MapIfPlus[f, x] === f[x]"
message   = "MapIfPlus should wrap f around a non-Plus expression"

# ---------------------------------------------------------------------------

[[tests]]
id          = "mapifplus_on_product"
description = "MapIfPlus[f, a*b] returns f[a*b] (product is not Plus)"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "MapIfPlus[f, a * b] === f[a * b]"
message   = "MapIfPlus should treat Times as atomic (not Plus)"

# ---------------------------------------------------------------------------

[[tests]]
id          = "delete_duplicates_basic"
description = "DeleteDuplicates removes repeated elements preserving order"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "DeleteDuplicates[{1, 2, 1, 3, 2}] === {1, 2, 3}"
message   = "DeleteDuplicates should deduplicate preserving first occurrence"

# ---------------------------------------------------------------------------

[[tests]]
id          = "delete_duplicates_already_unique"
description = "DeleteDuplicates on a unique list returns it unchanged"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "DeleteDuplicates[{a, b, c}] === {a, b, c}"
message   = "DeleteDuplicates on a unique list should be identity"

# ---------------------------------------------------------------------------

[[tests]]
id          = "delete_duplicates_all_same"
description = "DeleteDuplicates on all-same list gives a singleton"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "DeleteDuplicates[{x, x, x}] === {x}"
message   = "DeleteDuplicates with all identical elements yields singleton"

# ---------------------------------------------------------------------------

[[tests]]
id          = "duplicate_free_q_true"
description = "DuplicateFreeQ returns True for a list with no repeats"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "DuplicateFreeQ[{1, 2, 3}] === True"
message   = "DuplicateFreeQ should be True when all elements are distinct"

# ---------------------------------------------------------------------------

[[tests]]
id          = "duplicate_free_q_false"
description = "DuplicateFreeQ returns False for a list with a duplicate"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "DuplicateFreeQ[{1, 2, 1}] === False"
message   = "DuplicateFreeQ should be False when an element repeats"

# ---------------------------------------------------------------------------

[[tests]]
id          = "duplicate_free_q_empty"
description = "DuplicateFreeQ is True for the empty list"

[[tests.operations]]
action = "Assert"
[tests.operations.args]
condition = "DuplicateFreeQ[{}] === True"
message   = "Empty list has no duplicates"
