name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "src/**"
      - "notebooks/**"
      - "*.jl"
      - "Project.toml"
      - "justfile"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - name: Cache Julia packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.julia/packages
            ~/.julia/compiled
          key: julia-docs-${{ hashFiles('docs/Project.toml', 'Project.toml') }}
          restore-keys: julia-docs-
      - name: Install dependencies
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --project=docs/ -e 'using Pkg; Pkg.develop(path="."); Pkg.resolve(); Pkg.instantiate()'
      - name: Run notebook smoke tests
        run: julia --project=. scripts/notebook_smoke.jl

      - name: Build documentation
        run: julia --project=docs/ docs/make.jl
        env:
          CI: "true"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
