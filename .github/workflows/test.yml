name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.vale.ini'
      - '.gitignore'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.vale.ini'
      - '.gitignore'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Cache Julia packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.julia/packages
            ~/.julia/compiled
          key: julia-1.12-${{ hashFiles('Project.toml', 'tooling/Manifest.toml') }}
          restore-keys: julia-1.12-

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Patch juliacall OpenSSL_jll constraint for Julia 1.12
        # juliacall 0.9.31 caps Julia at 1.11 when Python's OpenSSL < 3.5
        # (pyjuliapkg#75). Safe to remove since we control Julia via setup-julia.
        run: |
          python -c "
          import json, glob
          for p in glob.glob('.venv/**/juliacall/juliapkg.json', recursive=True):
              d = json.loads(open(p).read())
              d.get('packages', {}).pop('OpenSSL_jll', None)
              open(p, 'w').write(json.dumps(d, indent=4))
          "

      - name: Instantiate Julia project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run pytest (Unit)
        run: |
          # juliacall may SIGSEGV (exit 139) during atexit cleanup after all
          # tests pass. Use --junitxml to capture the real test result so a
          # teardown crash doesn't mask a green run.
          uv run pytest tests/ -q -m "not slow" \
            --ignore=tests/integration --ignore=tests/properties \
            --ignore=tests/xperm --ignore=tests/xtensor \
            --junitxml=test-results.xml || true
          python -c "
          import xml.etree.ElementTree as ET, sys
          ts = ET.parse('test-results.xml').getroot()
          errs = int(ts.get('errors', 0))
          fails = int(ts.get('failures', 0))
          if errs + fails > 0:
              print(f'FAILED: {fails} failures, {errs} errors')
              sys.exit(1)
          print(f'OK: {ts.get(\"tests\")} tests passed')
          "

  julia-tests:
    name: Julia Tests (${{ matrix.julia-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        julia-version: ["1.10", "1.11", "1.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - name: Cache Julia packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.julia/packages
            ~/.julia/compiled
          key: julia-${{ matrix.julia-version }}-${{ hashFiles('Project.toml', 'tooling/Manifest.toml') }}
          restore-keys: julia-${{ matrix.julia-version }}-

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Patch juliacall OpenSSL_jll constraint
        if: matrix.julia-version == '1.12'
        run: |
          python -c "
          import json, glob
          for p in glob.glob('.venv/**/juliacall/juliapkg.json', recursive=True):
              d = json.loads(open(p).read())
              d.get('packages', {}).pop('OpenSSL_jll', None)
              open(p, 'w').write(json.dumps(d, indent=4))
          "

      - name: Instantiate Julia project
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --project=tooling -e 'using Pkg; Pkg.instantiate()'

      - name: Run Julia tests (Unit + Logic)
        run: julia --project=. -e 'using Pkg; Pkg.test()'

      - name: Run TOML regression tests (xperm + xtensor)
        run: |
          uv run xact-test run tests/xperm --adapter julia --oracle-mode snapshot --oracle-dir oracle
          uv run xact-test run tests/xtensor --adapter julia --oracle-mode snapshot --oracle-dir oracle
