name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.vale.ini'
      - '.gitignore'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.vale.ini'
      - '.gitignore'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Cache Julia packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.julia/packages
            ~/.julia/compiled
          key: julia-1.12-${{ hashFiles('Project.toml', 'tooling/Manifest.toml') }}
          restore-keys: julia-1.12-

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Instantiate Julia project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Run pytest (Unit)
        env:
          PYTHON_JULIAPKG_OFFLINE: "yes"
        run: uv run pytest tests/ -q -m "not slow" --ignore=tests/integration --ignore=tests/properties --ignore=tests/xperm --ignore=tests/xtensor

  julia-tests:
    name: Julia Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Cache Julia packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.julia/packages
            ~/.julia/compiled
          key: julia-1.12-${{ hashFiles('Project.toml', 'tooling/Manifest.toml') }}
          restore-keys: julia-1.12-

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Instantiate Julia project
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --project=tooling -e 'using Pkg; Pkg.instantiate()'

      - name: Run Julia tests (Unit + Logic)
        run: julia --project=. test/runtests.jl

      - name: Run TOML regression tests (xperm + xtensor)
        run: |
          uv run xact-test run tests/xperm --adapter julia --oracle-mode snapshot --oracle-dir oracle
          uv run xact-test run tests/xtensor --adapter julia --oracle-mode snapshot --oracle-dir oracle
