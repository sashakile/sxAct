services:
  wolfram:
    image: wolframresearch/wolframengine:latest
    user: root
    volumes:
      - ./resources/xAct:/opt/xAct:ro
      - ./notebooks:/notebooks
      - wolfram-config:/root/.WolframEngine
    environment:
      - XACT_PATH=/opt/xAct
    stdin_open: true
    tty: true
    command: /bin/bash

  oracle:
    build: ./oracle
    ports:
      - "8765:8765"
    volumes:
      - ./resources/xAct:/opt/xAct:ro
      - wolfram-config:/root/.WolframEngine
    environment:
      - XACT_PATH=/opt/xAct
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  wolfram-config:
