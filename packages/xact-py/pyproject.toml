[project]
name = "xact-py"
version = "0.3.0"
description = "Python wrapper for xAct"
requires-python = ">=3.10"
dependencies = [
    "juliacall>=0.9.31",
    "juliapkg>=0.1.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/xact"]

[tool.hatch.build.targets.wheel.force-include]
"../../Project.toml" = "xact/julia/Project.toml"
"../../src" = "xact/julia/src"

[tool.hatch.build.targets.sdist.force-include]
"../../Project.toml" = "xact/julia/Project.toml"
"../../src" = "xact/julia/src"
