[project]
name = "xact-py"
version = "0.7.1"
description = "Python wrapper for XAct.jl — tensor algebra for general relativity"
readme = "README.md"
requires-python = ">=3.10"
license = "GPL-3.0-or-later"
authors = [
    { name = "sashakile", email = "saxa.kile@gmail.com" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: GNU General Public License v3 or later (GPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "juliacall>=0.9.31",
    "juliapkg>=0.1.14",
]

[project.urls]
Homepage = "https://github.com/sashakile/XAct.jl"
Repository = "https://github.com/sashakile/XAct.jl"
Documentation = "https://saxa.xyz/XAct.jl"
Changelog = "https://github.com/sashakile/XAct.jl/releases"

[project.optional-dependencies]
translate = []

[project.scripts]
xact = "xact.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
exclude = [
    "src/xact/julia",
    "src/xact/julia/**",
]

[tool.hatch.build.targets.wheel]
packages = ["src/xact"]
