[project]
name = "sxact"
version = "0.4.0"
description = "Testing framework for xAct implementations"
requires-python = ">=3.10"
dependencies = [
    "jsonschema>=4.26.0",
    "numpy>=2.2.6",
    "requests>=2.28.0",
    "tomli>=2.4.0; python_version < '3.11'",
    "xact-py",
]

[project.scripts]
xact-test = "sxact.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sxact"]
