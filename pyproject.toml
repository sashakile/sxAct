[project]
name = "sxact"
version = "0.1.0"
description = "Testing framework for xAct implementations"
requires-python = ">=3.10"
dependencies = [
    "jsonschema>=4.26.0",
    "requests>=2.28.0",
    "tomli>=2.4.0",
]

[project.scripts]
xact-test = "sxact.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "mypy>=1.0.0",
    "types-requests>=2.28.0",
]
docs = [
    "mkdocs>=1.6.0",
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=0.25.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sxact"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "oracle: tests requiring the Docker oracle server",
    "slow: tests that take a long time to run (xAct loading ~3+ min)",
]
